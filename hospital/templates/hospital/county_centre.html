{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="max-w-7xl mx-auto py-6">

  <!-- HEADER -->
  <div class="mb-4">

    <!-- TITLE -->
    <h1 class="text-2xl font-bold text-green-600">
      {{ county.name }} Dialysis Centers
    </h1>

    <p class="text-sm text-gray-500">
      <span id="count">{{ hospital|length }}</span> centers available
    </p>

  </div>

  <!-- 🔍 FILTERS (LEFT SIDE UNDER TITLE) -->
  <div class="mb-6">

    <div class="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-4 gap-3 max-w-3xl">

      <input type="text"
             id="name"
             placeholder="Search hospital name"
             class="border p-2 rounded focus:ring-2 focus:ring-orange-400">

      <input type="text"
             id="constituent"
             placeholder="Constituent"
             class="border p-2 rounded focus:ring-2 focus:ring-orange-400">

      <input type="text"
             id="ward"
             placeholder="Ward"
             class="border p-2 rounded focus:ring-2 focus:ring-orange-400">

      <!-- optional reset -->
      <button onclick="resetFilters()"
              class="bg-gray-200 text-gray-700 rounded px-3 py-2 hover:bg-gray-300">
        Clear
      </button>

    </div>

  </div>

  <!-- 🏥 RESULTS GRID -->
  <div id="results"
       class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

    {% for hospital in hospital %}
    <div class="bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden">

      <a href="{% url 'centre_detail' pk=hospital.pk %}">
        {% if hospital.image %}
          <img src="{{ hospital.image.url }}" class="w-full h-44 object-cover">
        {% else %}
          <img src="{% static 'placeholder.png' %}" class="w-full h-44 object-cover">
        {% endif %}
      </a>

      <div class="p-4 space-y-1">

        <h2 class="font-semibold text-gray-800 truncate">
          {{ hospital.name }}
        </h2>

        <p class="text-sm text-gray-500 truncate">
          📍 {{ hospital.location }}
        </p>

      </div>

    </div>
    {% endfor %}

  </div>

</div>

<!-- ================= AJAX SCRIPT ================= -->
<script>

let timeout = null;

function fetchData() {

  const name = document.getElementById("name").value;
  const constituent = document.getElementById("constituent").value;
  const ward = document.getElementById("ward").value;

  fetch(window.location.pathname + `?name=${name}&constituent=${constituent}&ward=${ward}`, {
    headers: {
      "X-Requested-With": "XMLHttpRequest"
    }
  })
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("results");
    container.innerHTML = "";

    document.getElementById("count").innerText = data.hospitals.length;

    if (data.hospitals.length === 0) {
      container.innerHTML = `
        <div class="col-span-full text-center text-gray-500 py-10">
          No centers found
        </div>
      `;
      return;
    }

    data.hospitals.forEach(h => {

      container.innerHTML += `
        <div class="bg-white rounded-xl shadow hover:shadow-lg transition overflow-hidden">

          <a href="/${h.id}/centre_detail">
            <img src="${h.image || '/static/placeholder.png'}"
                 class="w-full h-44 object-cover">
          </a>

          <div class="p-4">
            <h2 class="font-semibold truncate">${h.name}</h2>
            <p class="text-sm text-gray-500">📍 ${h.location}</p>
          </div>

        </div>
      `;
    });

  });

}

// debounce
function triggerSearch() {
  clearTimeout(timeout);
  timeout = setTimeout(fetchData, 400);
}

// events
document.getElementById("name").addEventListener("input", triggerSearch);
document.getElementById("constituent").addEventListener("input", triggerSearch);
document.getElementById("ward").addEventListener("input", triggerSearch);

// reset filters
function resetFilters() {
  document.getElementById("name").value = "";
  document.getElementById("constituent").value = "";
  document.getElementById("ward").value = "";
  fetchData();
}

</script>

{% endblock %}
