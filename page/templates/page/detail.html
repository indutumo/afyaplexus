{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="lg:px-10 py-6">

  <div class="grid  gap-6 bg-white p-4 rounded shadow">
<!-- TOP PROGRESS BAR -->
<div id="progressBar" class="fixed top-0 left-0 h-1 bg-black z-50" style="width:0%"></div>


<!-- MAIN -->
<div class="flex justify-center">

  <!-- LEFT FLOATING BAR -->
  <div class="hidden lg:flex flex-col items-center gap-6 sticky top-32 h-fit mr-10">

    <button onclick="clapPost('{{ page.id }}')" class="flex flex-col items-center text-gray-500 hover:text-black">
      👏
      <span id="clap-count">{{ page.clap_count }}</span>
    </button>

    <button onclick="bookmarkPost('{{ page.id }}')" class="text-gray-500 hover:text-black">
      🔖
    </button>

    <button class="text-gray-500 hover:text-black">🔗</button>

  </div>

  <!-- ARTICLE -->
  <article class="max-w-2xl w-full px-4 py-10">

    <!-- TITLE -->
    <h1 class="text-4xl md:text-4xl font-bold leading-tight mb-6">
      {{ page.title }}
    </h1>

    <!-- AUTHOR -->
    <div class="flex items-center gap-3 mb-8">

      <div class="w-10 h-10 bg-gray-300 rounded-full"></div>

      <div class="text-sm">
        <p class="font-semibold">{{ page.user }}</p>
        <p class="text-gray-500">
          {{ page.date|date:"M d, Y" }} · {{ page.reading_time }} min read
        </p>
      </div>

    </div>

    <!-- IMAGE -->
    {% if page.image %}
    <img src="{{ page.image.url }}" class="w-full rounded mb-8">
    {% endif %}

    <!-- CONTENT -->
    <div class="prose prose-lg max-w-none leading-relaxed">
      {{ page.content|linebreaks }}
    </div>

    <!-- BOTTOM ACTION BAR -->
    <div class="flex items-center justify-between mt-12 border-t pt-6">

      <div class="flex items-center gap-6">

        <button onclick="clapPost('{{ page.id }}')" class="flex items-center gap-2 text-gray-600 hover:text-black">
          👏 <span id="clap-count-bottom">{{ page.clap_count }}</span>
        </button>

        <button onclick="bookmarkPost('{{ page.id }}')" class="text-gray-600 hover:text-black">
          🔖 Save
        </button>

      </div>

      <button class="text-gray-500 hover:text-black text-sm">
        Share
      </button>

    </div>

  </article>

</div>
</div>
</div>


<!-- JS -->
<script>
// 👏 CLAP
function clapPost(id) {
  fetch(`/clap/${id}/`)
    .then(res => res.json())
    .then(data => {
      document.getElementById("clap-count").innerText = data.claps;
      document.getElementById("clap-count-top").innerText = data.claps;
      document.getElementById("clap-count-bottom").innerText = data.claps;
    });
}

// 🔖 BOOKMARK
function bookmarkPost(id) {
  fetch(`/bookmark/${id}/`)
    .then(res => res.json())
    .then(data => {
      alert(data.bookmarked ? "Saved!" : "Removed!");
    });
}

// 📊 READING PROGRESS
window.addEventListener("scroll", () => {
  const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  const scrolled = (winScroll / height) * 100;
  document.getElementById("progressBar").style.width = scrolled + "%";
});
</script>

{% endblock %}
